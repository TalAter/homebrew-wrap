name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

# We ship prebuilt, ad-hoc codesigned macOS binaries (not source-built), so
# `brew test-bot --only-formulae` / `--build-bottle` is the wrong tool — it
# tries to relocate paths inside the Mach-O binary and invalidates the
# signature, which then SIGKILLs when `generate_completions_from_executable`
# tries to fork it. Syntax + audit is the value for this tap's CI; the
# install path is exercised by every real `brew install talater/wrap/wrap`.

jobs:
  test-bot:
    runs-on: ubuntu-latest
    container: ghcr.io/homebrew/brew:main
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
